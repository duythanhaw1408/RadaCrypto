profile: personal-default
locale: vi-VN

trader:
  display_name: Trader cá nhân
  timezone: Asia/Ho_Chi_Minh

defaults:
  symbol: BTCUSDT
  replay_events: fixtures/replay/btcusdt_normalized.jsonl
  summary_out: data/replay/summary_btcusdt.json

scan:
  actionable_threshold: 75
  max_cards: 3
  trade_window_seconds: 60
  max_window_trades: 400
  thesis_log: data/thesis/scan_thesis.jsonl

live:
  symbol: BTCUSDT
  raw_dir: data/raw
  max_events: 25
  watchdog_idle_seconds: 45
  heartbeat_interval: 250
  trade_window_seconds: 60
  max_window_trades: 400
  actionable_threshold: 75
  thesis_log: data/thesis/live_thesis.jsonl

review:
  summary_path: data/replay/summary_btcusdt.json
  health_report_path: data/review/health_status.json
  live_runtime_path: data/review/live_runtime.json

  daily_summary_path: data/review/daily_summary.json

  review_journal_path: data/review/review_journal.jsonl
  tuning_report_path: data/review/tuning_report.json
  weekly_summary_path: data/review/weekly_review.json

ux:
  alert_on_stage_change: true
  alert_on_score_delta: 10.0
  alert_score_floor: 65.0
