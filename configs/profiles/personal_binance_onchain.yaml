profile: personal-binance-onchain
locale: vi-VN

trader:
  display_name: Trader On-chain Specialist
  timezone: Asia/Ho_Chi_Minh

defaults:
  symbol: SOLUSDT
  replay_events: fixtures/replay/btcusdt_normalized.jsonl
  summary_out: data/replay/summary_sol_onchain.json

scan:
  actionable_threshold: 65
  max_cards: 10
  trade_window_seconds: 60
  max_window_trades: 400

live:
  symbol: SOLUSDT
  raw_dir: data/raw/onchain
  max_events: 500
  trade_window_seconds: 60
  max_window_trades: 400

review:
  summary_path: "data/replay/summary_sol.json"

outcomes:
  horizons: ["1h", "4h", "24h"]

ux:
  alert_on_stage_change: true
  alert_on_score_delta: 5.0 # On-chain needs more sensitivity
  alert_score_floor: 65.0

# Placeholder for future on-chain data providers
onchain:
  helius_api_key: "${HELIUS_API_KEY}"
  jupiter_enabled: true
