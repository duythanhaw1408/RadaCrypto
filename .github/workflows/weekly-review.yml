name: weekly-review

on:
  schedule:
    - cron: '20 0 * * 1'
  workflow_dispatch:

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e .
      - run: python scripts/init_sqlite_db.py
      - run: python -m cfte.cli.main --profile configs/profiles/personal.default.yaml review-week

      - name: Run tuning snapshot
        run: python -m cfte.cli.main --profile configs/profiles/personal.default.yaml tune-profile
      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-review-artifacts
          path: |
            data/review/*.json
            data/review/*.jsonl
          if-no-files-found: warn
