name: CFTE Weekly Review

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Chạy Chủ nhật 01:00 UTC = 08:00 ICT
    - cron: '0 1 * * 0'
  workflow_dispatch:

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .

    - name: Restore data
      uses: actions/cache@v4
      with:
        path: data/
        key: cfte-data-${{ github.ref }}-
        restore-keys: cfte-data-

    - name: Initialize SQLite
      run: python scripts/init_sqlite_db.py

    - name: Run Weekly Review
      env:
        PYTHONPATH: src
      run: |
        python -m cfte.cli.main --profile configs/profiles/personal_binance.yaml review-week
        python -m cfte.cli.main --profile configs/profiles/personal_binance.yaml scorecard
        python -m cfte.cli.main --profile configs/profiles/personal_binance.yaml tune-profile

    - name: Upload weekly report
      uses: actions/upload-artifact@v4
      with:
        name: cfte-weekly-${{ github.run_number }}
        path: |
          data/review/weekly_review.json
          data/review/tuning_report.json
        retention-days: 30
