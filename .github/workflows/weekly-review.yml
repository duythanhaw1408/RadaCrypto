name: weekly-review

on:
  schedule:
    - cron: '20 0 * * 1'
  workflow_dispatch:

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e .
      - run: python scripts/init_sqlite_db.py
      - run: python -m cfte.cli.main --profile configs/profiles/personal.default.yaml review-week
