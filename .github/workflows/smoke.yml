name: Smoke Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e . 2>&1 || true
        python -m pip install PyYAML requests websockets aiosqlite
    - name: Initialize DB
      run: |
        python scripts/init_sqlite_db.py
    - name: Run Doctor
      run: |
        PYTHONPATH=src python -m cfte.cli.main doctor --profile configs/profiles/personal_binance.yaml
    - name: Run Replay Determinism
      run: |
        PYTHONPATH=src python -m cfte.cli.main replay --profile configs/profiles/personal_binance.yaml
    - name: Run Health Check
      run: |
        PYTHONPATH=src python -m cfte.cli.main health --profile configs/profiles/personal_binance.yaml
