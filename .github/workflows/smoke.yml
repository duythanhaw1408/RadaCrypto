name: Smoke Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .
    - name: Run Doctor
      run: |
        PYTHONPATH=src python -m cfte.cli.main doctor --profile configs/profiles/personal_binance.yaml
    - name: Run Replay Determinism
      run: |
        PYTHONPATH=src python -m cfte.cli.main replay
    - name: Run Tests
      run: |
        PYTHONPATH=src python -m pytest tests/ -q
