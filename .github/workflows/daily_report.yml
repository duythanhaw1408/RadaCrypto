name: Daily Activity Watchdog

on:
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-env: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Run Watchdog Summary
      run: |
        # This is a template. For real use, the DB needs to be present or synced.
        # Locally, a user would run this via crontab.
        python -m cfte.cli.main watchdog
    - name: Run Daily Review
      run: |
        python -m cfte.cli.main review-day
