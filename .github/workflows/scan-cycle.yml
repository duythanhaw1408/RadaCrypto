name: CFTE Scan Cycle (4x/ngày)

on:
  schedule:
    # Chạy mỗi 6 giờ: 00:00, 06:00, 12:00, 18:00 UTC
    # = 07:00, 13:00, 19:00, 01:00 ICT (UTC+7)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:  # Cho phép chạy bằng tay

jobs:
  scan-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .

    - name: Restore data artifacts
      uses: actions/cache@v4
      with:
        path: |
          data/
        key: cfte-data-${{ github.ref }}-${{ github.run_number }}
        restore-keys: |
          cfte-data-${{ github.ref }}-

    - name: Initialize SQLite (if needed)
      run: python scripts/init_sqlite_db.py

    - name: Run CFTE Scan Cycle
      env:
        PYTHONPATH: src
      run: |
        python scripts/run_cycle.py \
          --skip-live \
          --profile configs/profiles/personal_binance.yaml

    - name: Upload scan artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cfte-scan-${{ github.run_number }}
        path: |
          data/replay/summary_btcusdt.json
          data/review/daily_summary.json
          data/review/health_status.json
          data/thesis/thesis_log.jsonl
        retention-days: 14

    - name: Save data cache
      uses: actions/cache/save@v4
      with:
        path: |
          data/
        key: cfte-data-${{ github.ref }}-${{ github.run_number }}
