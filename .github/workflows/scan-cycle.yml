name: CFTE Scan Cycle (Snapshot cho Pages)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Chạy mỗi 2 giờ, phù hợp với free-tier snapshot
    - cron: '5 */2 * * *'
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'configs/**'
      - '.github/workflows/scan-cycle.yml'
  workflow_dispatch:  # Cho phép chạy bằng tay

permissions:
  contents: write

jobs:
  scan-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .

    - name: Restore data artifacts
      uses: actions/cache@v4
      with:
        path: |
          data/
        key: cfte-data-${{ github.ref }}-${{ github.run_number }}
        restore-keys: |
          cfte-data-${{ github.ref }}-

    - name: Initialize SQLite (if needed)
      run: python scripts/init_sqlite_db.py

    - name: Reprime Fixture (Sync to Today)
      run: python scripts/reprime_data.py

    - name: Run CFTE Scan Cycle
      env:
        PYTHONPATH: src
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # GitHub-hosted runner thường bị geo-block bởi Binance/Bybit.
        # Ở free-tier public Pages, ưu tiên scan/replay-first thay vì live giả xanh.
        python scripts/run_cycle.py \
          --skip-live \
          --profile configs/profiles/personal_binance.yaml

    - name: Copy data to docs for GitHub Pages
      run: |
        mkdir -p docs/data
        cp -f data/review/health_status.json docs/data/ 2>/dev/null || true
        cp -f data/review/daily_summary.json docs/data/ 2>/dev/null || true
        cp -f data/review/weekly_review.json docs/data/ 2>/dev/null || true
        cp -f data/review/live_runtime.json docs/data/ 2>/dev/null || true
        cp -f data/replay/summary_btcusdt.json docs/data/ 2>/dev/null || true
        
        if [ -f data/thesis/thesis_log.jsonl ]; then
          python3 -c "
        import json
        lines = open('data/thesis/thesis_log.jsonl').readlines()
        entries = [json.loads(l) for l in lines if l.strip()]
        json.dump(entries[-100:], open('docs/data/thesis_log.json','w'), ensure_ascii=False)
        "
        fi

        # Export TPFM Layers from SQLite
        python3 -c "
        import sqlite3, json, os
        db_path = 'data/state/state.db'
        if not os.path.exists(db_path): exit(0)
        conn = sqlite3.connect(db_path)
        conn.row_factory = sqlite3.Row
        
        # M5 snapshots
        m5 = [dict(r) for r in conn.execute('SELECT * FROM tpfm_m5_snapshot ORDER BY window_end_ts DESC LIMIT 50').fetchall()]
        json.dump(m5, open('docs/data/tpfm_m5.json','w'), ensure_ascii=False)
        
        # 30m regimes
        m30 = [dict(r) for r in conn.execute('SELECT * FROM tpfm_m30_regime ORDER BY window_end_ts DESC LIMIT 50').fetchall()]
        json.dump(m30, open('docs/data/tpfm_m30.json','w'), ensure_ascii=False)
        
        # 4h structural
        h4 = [dict(r) for r in conn.execute('SELECT * FROM tpfm_4h_structural ORDER BY window_end_ts DESC LIMIT 10').fetchall()]
        json.dump(h4, open('docs/data/tpfm_4h.json','w'), ensure_ascii=False)
        
        conn.close()
        "

        python3 -c "
        import json, os
        from datetime import datetime, timezone
        runtime = {}
        summary = {}
        if os.path.exists('data/review/live_runtime.json'):
          runtime = json.load(open('data/review/live_runtime.json'))
        if os.path.exists('data/replay/summary_btcusdt.json'):
          summary = json.load(open('data/replay/summary_btcusdt.json'))
        top_signal = (summary.get('top_signals') or [None])[0] or {}
        derived_grade = top_signal.get('tradability_grade') or (
          'A' if top_signal.get('stage') == 'ACTIONABLE'
          else 'B' if top_signal.get('stage') == 'WATCHLIST'
          else 'C' if top_signal else None
        )
        status = {
          'last_run': datetime.now(tz=timezone.utc).isoformat(),
          'last_scan_time': datetime.now(tz=timezone.utc).isoformat(),
          'scan_count': ${{ github.run_number }},
          'data_mode': 'scan_only',
          'live_enabled': False,
          'first_m5_seen_at': runtime.get('first_m5_seen_at'),
          'latest_flow_grade': runtime.get('latest_flow_grade') or derived_grade,
          'latest_transition': runtime.get('latest_transition', {}),
          'top_signal': top_signal,
          'workflows': [
            {'name':'CFTE Scan Cycle (scan-only / 2h)','status':'success','last_run':datetime.now(tz=timezone.utc).isoformat(),'duration':'~2m'},
          ]
        }
        json.dump(status, open('docs/data/actions_status.json','w'), ensure_ascii=False)
        "

    - name: Commit dashboard data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -f docs/data/
        git diff --staged --quiet || git commit -m "📊 Update dashboard data [skip ci]"
        git push || true

    - name: Upload scan artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cfte-scan-${{ github.run_number }}
        path: |
          data/replay/summary_btcusdt.json
          data/review/daily_summary.json
          data/review/health_status.json
          data/review/live_runtime.json
          data/thesis/thesis_log.jsonl
        retention-days: 14

    - name: Save data cache
      uses: actions/cache/save@v4
      with:
        path: |
          data/
        key: cfte-data-${{ github.ref }}-${{ github.run_number }}
